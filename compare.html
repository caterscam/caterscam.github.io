<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caterscam - Compare & Deduper</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Tint&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col min-h-screen bg-gray-900 text-white">
    <header class="text-center py-4 bg-gray-800 shadow-md">
        <h1 class="text-3xl font-bold text-red-500" style="font-family: 'Bungee Tint', cursive;">
            Caterscam - Compare & Deduper
        </h1>
    </header>

    <main class="flex-1 grid grid-cols-1 md:grid-cols-3 gap-4 p-4">
        <div class="flex flex-col h-full">
            <label for="input1" class="text-red-400 uppercase mb-2 text-sm font-bold" style="font-family: 'Bungee Tint', cursive;">
                Kolom 1 (Master List):
            </label>
            <textarea id="input1" class="flex-1 p-3 border border-gray-700 bg-gray-800 text-white rounded resize-none min-h-[60vh]" placeholder="Paste list lama/referensi di sini..."></textarea>
        </div>

        <div class="flex flex-col h-full">
            <label for="input2" class="text-red-400 uppercase mb-2 text-sm font-bold" style="font-family: 'Bungee Tint', cursive;">
                Kolom 2 (Data Baru):
            </label>
            <textarea id="input2" class="flex-1 p-3 border border-gray-700 bg-gray-800 text-white rounded resize-none min-h-[60vh]" placeholder="Paste list baru yang mau dicek di sini..."></textarea>
        </div>

        <div class="flex flex-col h-full">
            <label for="outputResult" class="text-green-400 uppercase mb-2 text-sm font-bold" style="font-family: 'Bungee Tint', cursive;">
                Kolom 3 (Result Baru & Unik):
            </label>
            <textarea id="outputResult" class="flex-1 p-3 border border-green-700 bg-gray-900 text-green-400 rounded resize-none min-h-[60vh]" placeholder="Hasil yang tidak ada di Kolom 1 akan muncul di sini..." readonly></textarea>
        </div>
    </main>

    <footer class="p-4 bg-gray-800 text-center flex justify-center gap-4">
        <button id="processButton" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded text-white font-semibold shadow-md transition">
            Compare & Get Unique
        </button>
        <button id="copyButton" class="bg-green-600 hover:bg-green-500 px-6 py-2 rounded text-white font-semibold shadow-md transition">
            Copy Result
        </button>
    </footer>

    <script>
        // Fungsi untuk menormalisasi line agar http, https, www dianggap sama
        function normalizeLine(line) {
            let text = line.trim();
            if (!text) return null;
            
            // Hapus http:// atau https://
            text = text.replace(/^https?:\/\//i, '');
            // Hapus www.
            text = text.replace(/^www\./i, '');
            
            return text;
        }

        document.getElementById('processButton').addEventListener('click', () => {
            const text1 = document.getElementById('input1').value;
            const text2 = document.getElementById('input2').value;

            const lines1 = text1.split('\n').map(x => x.trim()).filter(Boolean);
            const lines2 = text2.split('\n').map(x => x.trim()).filter(Boolean);

            const seenInMaster = new Set();
            
            // 1. Masukkan semua data Kolom 1 ke dalam Set (sebagai database master)
            for (const line of lines1) {
                const norm = normalizeLine(line);
                if (norm) seenInMaster.add(norm);
            }

            const result = [];
            const seenInResult = new Set(); // Mencegah duplikat di dalam Kolom 2 itu sendiri

            // 2. Cek data di Kolom 2
            for (const line of lines2) {
                const norm = normalizeLine(line);
                
                // Jika line valid, tidak ada di Kolom 1, dan belum masuk ke Result
                if (norm && !seenInMaster.has(norm) && !seenInResult.has(norm)) {
                    seenInResult.add(norm);
                    // Standardisasi output menjadi http://... seperti request kamu
                    result.push('http://' + norm);
                }
            }

            // 3. Tampilkan hasil di Kolom 3
            document.getElementById('outputResult').value = result.join('\n');
        });

        // Fitur tambahan: Copy to Clipboard biar gampang
        document.getElementById('copyButton').addEventListener('click', () => {
            const output = document.getElementById('outputResult');
            output.select();
            document.execCommand('copy');
            alert('Hasil berhasil di-copy ke clipboard!');
        });
    </script>
</body>
</html>
